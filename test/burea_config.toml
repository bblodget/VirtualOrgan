[audio]
sample_rate = 48000
buffer_size = 1024
jack_client_name = "organ"
num_outputs = 8

# Ranks — pure sample definitions
[ranks.gedackt8]
sample_dir = "samples/Burea_Funeral_Chapel/Gedackt8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.salicional8]
sample_dir = "samples/Burea_Funeral_Chapel/Salicional8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.voixceleste8]
sample_dir = "samples/Burea_Funeral_Chapel/VoixCeleste8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.rorflojt4]
sample_dir = "samples/Burea_Funeral_Chapel/Rorflojt4"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.principal2]
sample_dir = "samples/Burea_Funeral_Chapel/Principal2"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.pedgedackt8]
sample_dir = "samples/Burea_Funeral_Chapel/PedGedackt8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.subbas16]
sample_dir = "samples/Burea_Funeral_Chapel/Subbas16"
filename_pattern = "{note:03d}-{name}.wav"

# Routing — speaker test: 8 consecutive notes → 8 individual speakers
# Default: any note not listed below goes to channel 1
[routing.default]
source = { division = "manual" }
output_channels = [1]

# C4=ch1, D4=ch2, E4=ch3, F4=ch4, G4=ch5, A4=ch6, B4=ch7, C5=ch8
[routing.note_60]
source = { division = "manual", note_range = [60] }
output_channels = [1]    # Front Left

[routing.note_62]
source = { division = "manual", note_range = [62] }
output_channels = [2]    # Front Right

[routing.note_64]
source = { division = "manual", note_range = [64] }
output_channels = [3]    # Rear Left

[routing.note_65]
source = { division = "manual", note_range = [65] }
output_channels = [4]    # Rear Right

[routing.note_67]
source = { division = "manual", note_range = [67] }
output_channels = [5]    # Front Center

[routing.note_69]
source = { division = "manual", note_range = [69] }
output_channels = [6]   # LFE - Subwoofer

[routing.note_71]
source = { division = "manual", note_range = [71] }
output_channels = [7]   # Rear Left Surround

[routing.note_72]
source = { division = "manual", note_range = [72] }
output_channels = [8]   # Rear Right Surround

# MIDI device mapping
[midi_devices.CH345]
channel = 1

# Single division for speaker testing
[divisions.manual]
midi_channel = 1
expression_cc = 11

[divisions.manual.stops]
gedackt8 = { rank = "gedackt8", engage_cc = 39, engaged = true }
salicional8 = { rank = "salicional8", engage_cc = 37 }
voixceleste8 = { rank = "voixceleste8", engage_cc = 41 }
rorflojt4 = { rank = "rorflojt4", engage_cc = 43 }
principal2 = { rank = "principal2", engage_cc = 45 }
combo = { rank = ["gedackt8", "salicional8"], engage_cc = 48 }
