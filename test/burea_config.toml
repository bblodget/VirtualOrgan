[audio]
sample_rate = 48000
buffer_size = 1024
jack_client_name = "organ"
num_outputs = 8

# Ranks — pure sample definitions
[ranks.gedackt8]
sample_dir = "samples/Burea_Funeral_Chapel/Gedackt8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.salicional8]
sample_dir = "samples/Burea_Funeral_Chapel/Salicional8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.voixceleste8]
sample_dir = "samples/Burea_Funeral_Chapel/VoixCeleste8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.rorflojt4]
sample_dir = "samples/Burea_Funeral_Chapel/Rorflojt4"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.principal2]
sample_dir = "samples/Burea_Funeral_Chapel/Principal2"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.pedgedackt8]
sample_dir = "samples/Burea_Funeral_Chapel/PedGedackt8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.subbas16]
sample_dir = "samples/Burea_Funeral_Chapel/Subbas16"
filename_pattern = "{note:03d}-{name}.wav"

# Routing — division to HDMI surround channels
# HDMI 7.1: 1=FL 2=FR 3=FC 4=LFE 5=RL 6=RR 7=RC 8=RLC/RRC
[routing.manual]
source = { division = "manual" }
output_channels = [1]

[routing.pedal]
source = { division = "pedal" }
output_channels = [1]

[routing.gedackt8_1]
source = { rank = "gedackt8", note_range = [60] }
output_channels = [1]

[routing.gedackt8_2]
source = { rank = "gedackt8", note_range = [62] }
output_channels = [2]

[routing.gedackt8_3]
source = { rank = "gedackt8", note_range = [64] }
output_channels = [1]

[routing.gedackt8_4]
source = { rank = "gedackt8", note_range = [65] }
output_channels = [2]

[routing.gedackt8_5]
source = { rank = "gedackt8", note_range = [67] }
output_channels = [1]

[routing.gedackt8_6]
source = { rank = "gedackt8", note_range = [69] }
output_channels = [2]

[routing.gedackt8_7]
source = { rank = "gedackt8", note_range = [71] }
output_channels = [1]

[routing.gedackt8_8]
source = { rank = "gedackt8", note_range = [72] }
output_channels = [2]



# MIDI device mapping — remap keyboards to channels by ALSA client name
[midi_devices.CH345]
channel = 1

[midi_devices."Digital Piano"]
channel = 2

# Divisions — CC numbers from Bureå ODF
[divisions.manual]
midi_channel = 1
expression_cc = 11

[divisions.manual.stops]
gedackt8 = { rank = "gedackt8", engage_cc = 39, engaged = true }
salicional8 = { rank = "salicional8", engage_cc = 37, engaged = false }
voixceleste8 = { rank = "voixceleste8", engage_cc = 41, engaged = false }
rorflojt4 = { rank = "rorflojt4", engage_cc = 43 }
principal2 = { rank = "principal2", engage_cc = 45 }
combo = { rank = ["gedackt8", "salicional8"], engage_cc = 48 }

[divisions.pedal]
midi_channel = 2
expression_cc = 12

[divisions.pedal.stops]
subbas16 = { rank = "subbas16", engage_cc = 36, engaged = true }
pedgedackt8 = { rank = "pedgedackt8", engage_cc = 47, engaged = true }

# Couplers — CC number from Bureå ODF
[couplers.pedal_to_manual]
from = "pedal"
to = "manual"
engage_cc = 49
