[audio]
sample_rate = 48000
buffer_size = 1024
jack_client_name = "organ"
num_outputs = 2
release_fade_ms = 100

# Caen St. Étienne, Cavaillé-Coll (Demo)
# Each rank loads diffuse + rear perspectives from separate directories

# Grand Orgue (Great)
[ranks.montre8]
sample_dir = [
    "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/goDiff/Montre8",
    "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/goRear/Montre8"
]
filename_pattern = "{note:03d}-{name}.wav"

