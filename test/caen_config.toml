# Routing — both perspectives to stereo for laptop testing
# At Dad's: perspective 1 → front speakers, perspective 2 → rear speakers
[routing.front]
source = { perspective = 1 }
output_channels = [1]

[routing.rear]
source = { perspective = 2 }
output_channels = [2]

# MIDI device mapping
[midi_devices.CH345]
channel = 1

# Grand Orgue (Great)
[divisions.great]
midi_channel = 1
expression_cc = 11

[divisions.great.stops]
montre8 = { rank = "montre8", engage_cc = 39, engaged = true }
bourdon8 = { rank = "bourdon8", engage_cc = 37 }
fluteharmonique8 = { rank = "fluteharmonique8", engage_cc = 41 }
gambe8 = { rank = "gambe8", engage_cc = 43 }
trompette8 = { rank = "trompette8", engage_cc = 45 }
bombarde16 = { rank = "bombarde16", engage_cc = 47 }

# Récit (Swell)
[divisions.swell]
midi_channel = 2
expression_cc = 12

[divisions.swell.stops]
diapason8 = { rank = "diapason8", engage_cc = 50 }
bassonhautbois8 = { rank = "bassonhautbois8", engage_cc = 51 }
fluteoctaviante4 = { rank = "fluteoctaviante4", engage_cc = 52 }
nasard = { rank = "nasard", engage_cc = 53 }
octavin2 = { rank = "octavin2", engage_cc = 54 }
cornet = { rank = "cornet", engage_cc = 55 }

# Positif (Choir)
[divisions.choir]
midi_channel = 3
expression_cc = 13

[divisions.choir.stops]
bourdon16 = { rank = "bourdon16", engage_cc = 60 }
cordenuit8 = { rank = "cordenuit8", engage_cc = 61 }
salicional8 = { rank = "salicional8", engage_cc = 62 }

# Pédale
[divisions.pedal]
midi_channel = 4

[divisions.pedal.stops]
contrebasse16 = { rank = "contrebasse16", engage_cc = 70, engaged = true }
grosseflute8 = { rank = "grosseflute8", engage_cc = 71 }
