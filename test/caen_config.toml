[audio]
sample_rate = 48000
buffer_size = 1024
jack_client_name = "organ"
num_outputs = 8

# Caen St. Étienne, Cavaillé-Coll (Demo)
# Using "Diff" (diffuse) microphone perspective, dry samples

# Grand Orgue (Great) — goDiff
[ranks.montre8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/goDiff/Montre8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.bourdon8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/goDiff/Bourdon8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.fluteharmonique8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/goDiff/FluteHarmonique8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.gambe8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/goDiff/Gambe8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.trompette8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/goDiff/Trompette8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.bombarde16]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/goDiff/Bombarde16"
filename_pattern = "{note:03d}-{name}.wav"

# Récit (Swell) — recDiff
[ranks.diapason8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/recDiff/Diapason8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.bassonhautbois8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/recDiff/Bassonhautbois8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.fluteoctaviante4]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/recDiff/Fluteoctaviante4"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.nasard]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/recDiff/Nasard"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.octavin2]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/recDiff/Octavin2"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.cornet]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/recDiff/Cornet"
filename_pattern = "{note:03d}-{name}.wav"

# Positif (Choir) — posDiff
[ranks.bourdon16]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/posDiff/Bourdon16"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.cordenuit8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/posDiff/CorDeNuit8"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.salicional8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/posDiff/Salicional8"
filename_pattern = "{note:03d}-{name}.wav"

# Pédale — pedDiff
[ranks.contrebasse16]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/pedDiff/Contrebasse16"
filename_pattern = "{note:03d}-{name}.wav"

[ranks.grosseflute8]
sample_dir = "samples/Caen_Demo/OrganInstallationPackages/001704/pipe/pedDiff/GrosseFlute8"
filename_pattern = "{note:03d}-{name}.wav"

# Simple stereo routing
[routing.default]
source = { perspective = 1 }
output_channels = [6]

# MIDI device mapping
[midi_devices.CH345]
channel = 1

[midi_devices."Digital Piano"]
channel = 1

# Grand Orgue (Great) — notes 36+ on channel 1
[divisions.great]
midi_channel = 1
note_range = [36, 96]
expression_cc = 11

[divisions.great.stops]
montre8 = { rank = "montre8", engage_cc = 39, engaged = true }
bourdon8 = { rank = "bourdon8", engage_cc = 37 }
fluteharmonique8 = { rank = "fluteharmonique8", engage_cc = 41 }
gambe8 = { rank = "gambe8", engage_cc = 43 }
trompette8 = { rank = "trompette8", engage_cc = 45 }
bombarde16 = { rank = "bombarde16", engage_cc = 47 }

# Récit (Swell)
[divisions.swell]
midi_channel = 2
expression_cc = 12

[divisions.swell.stops]
diapason8 = { rank = "diapason8", engage_cc = 50 }
bassonhautbois8 = { rank = "bassonhautbois8", engage_cc = 51 }
fluteoctaviante4 = { rank = "fluteoctaviante4", engage_cc = 52 }
nasard = { rank = "nasard", engage_cc = 53 }
octavin2 = { rank = "octavin2", engage_cc = 54 }
cornet = { rank = "cornet", engage_cc = 55 }

# Positif (Choir)
[divisions.choir]
midi_channel = 3
expression_cc = 13

[divisions.choir.stops]
bourdon16 = { rank = "bourdon16", engage_cc = 60 }
cordenuit8 = { rank = "cordenuit8", engage_cc = 61 }
salicional8 = { rank = "salicional8", engage_cc = 62 }

# Pédale — low notes (21-35) on channel 1 from Digital Piano
[divisions.pedal]
midi_channel = 1
note_range = [24, 35]

[divisions.pedal.stops]
contrebasse16 = { rank = "contrebasse16", engage_cc = 70, engaged = true }
grosseflute8 = { rank = "grosseflute8", engage_cc = 71, engaged = true }
