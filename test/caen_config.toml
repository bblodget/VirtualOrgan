# MIDI device mapping
[midi_devices.CH345]
channel = 2

[midi_devices."Digital Piano"]
channel = 1

# Grand Orgue (Great) — notes 36+ on channel 1
[divisions.great]
midi_channel = 1
note_range = [36, 96]
expression_cc = 11

[divisions.great.stops]
montre8 = { rank = ["montre8", "montre8_rear"], engage_cc = 39, engaged = true }
bourdon8 = { rank = ["bourdon8", "bourdon8_rear"], engage_cc = 37, engaged = true }
fluteharmonique8 = { rank = ["fluteharmonique8", "fluteharmonique8_rear"], engage_cc = 41, engaged = true }
gambe8 = { rank = ["gambe8", "gambe8_rear"], engage_cc = 43, engaged = true }
trompette8 = { rank = ["trompette8", "trompette8_rear"], engage_cc = 45, engaged = true }
bombarde16 = { rank = ["bombarde16", "bombarde16_rear"], engage_cc = 47 }

# Récit (Swell)
[divisions.swell]
midi_channel = 2
expression_cc = 12

[divisions.swell.stops]
diapason8 = { rank = ["diapason8", "diapason8_rear"], engage_cc = 50, engaged = true }
bassonhautbois8 = { rank = ["bassonhautbois8", "bassonhautbois8_rear"], engage_cc = 51 }
fluteoctaviante4 = { rank = ["fluteoctaviante4", "fluteoctaviante4_rear"], engage_cc = 52 }
nasard = { rank = ["nasard", "nasard_rear"], engage_cc = 53 }
octavin2 = { rank = ["octavin2", "octavin2_rear"], engage_cc = 54 }
cornet = { rank = ["cornet", "cornet_rear"], engage_cc = 55 }

# Positif (Choir)
[divisions.choir]
midi_channel = 3
expression_cc = 13

[divisions.choir.stops]
bourdon16 = { rank = ["bourdon16", "bourdon16_rear"], engage_cc = 60 }
cordenuit8 = { rank = ["cordenuit8", "cordenuit8_rear"], engage_cc = 61 }
salicional8 = { rank = ["salicional8", "salicional8_rear"], engage_cc = 62 }

# Pédale — low notes (21-35) on channel 1 from Digital Piano
[divisions.pedal]
midi_channel = 1
note_range = [24, 35]

[divisions.pedal.stops]
contrebasse16 = { rank = ["contrebasse16", "contrebasse16_rear"], engage_cc = 70, engaged = true }
grosseflute8 = { rank = ["grosseflute8", "grosseflute8_rear"], engage_cc = 71, engaged = true }
