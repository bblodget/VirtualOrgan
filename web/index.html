<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1,
  maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>VirtualOrgan</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a1a1a; color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 12px; user-select: none;
  -webkit-text-size-adjust: 100%;
}
.header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 8px 0 12px;
}
.header h1 { font-size: 20px; font-weight: 600; }
.gain-control {
  display: flex; align-items: center; gap: 8px;
}
.gain-control label { font-size: 14px; color: #999; }
.gain-control input[type=range] {
  width: 150px; height: 8px;
  -webkit-appearance: none; appearance: none;
  background: #444; border-radius: 4px; outline: none;
}
.gain-control input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 24px; height: 24px; border-radius: 50%;
  background: #6a6aff; cursor: pointer;
}
.gain-value { font-size: 14px; color: #aaa; width: 40px; }
.division-section {
  padding: 8px 0 4px;
}
.division-label {
  font-size: 14px; color: #999;
  padding: 4px 0; text-transform: uppercase;
  letter-spacing: 1px; font-weight: 600;
}
.stops-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px; padding: 6px 0 8px;
}
.stop-btn {
  min-height: 50px; border-radius: 8px;
  border: 2px solid #444; background: #2a2a2a;
  color: #ccc; font-size: 14px; cursor: pointer;
  display: flex; align-items: center;
  justify-content: center; text-align: center;
  padding: 6px; line-height: 1.2;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.15s, border-color 0.15s;
}
.stop-btn.engaged {
  background: #1a3a1a; border-color: #3a8a3a;
  color: #6f6; box-shadow: 0 0 10px rgba(0,200,0,0.15);
}
.section-label {
  font-size: 13px; color: #777;
  padding: 8px 0 4px; text-transform: uppercase;
  letter-spacing: 1px;
}
.coupler-row {
  display: flex; gap: 10px; padding: 4px 0 8px;
  flex-wrap: wrap;
}
.coupler-btn {
  min-height: 44px; min-width: 120px;
  border-radius: 8px; border: 2px solid #554;
  background: #2a2a2a; color: #ccc;
  font-size: 14px; cursor: pointer;
  padding: 8px 16px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.15s, border-color 0.15s;
}
.coupler-btn.engaged {
  background: #3a2a1a; border-color: #8a6a3a;
  color: #fb3; box-shadow: 0 0 8px rgba(200,150,0,0.15);
}
.expression-section {
  padding: 12px 0 8px;
}
.expression-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0;
}
.expression-row label {
  font-size: 14px; color: #999; min-width: 70px;
}
.expression-row input[type=range] {
  flex: 1; max-width: 300px; height: 8px;
  -webkit-appearance: none; appearance: none;
  background: #444; border-radius: 4px; outline: none;
}
.expression-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 28px; height: 28px; border-radius: 50%;
  background: #5a8a5a; cursor: pointer;
}
.expression-value {
  font-size: 14px; color: #aaa; width: 45px; text-align: right;
}
.preset-row {
  display: flex; gap: 10px; padding: 4px 0;
  flex-wrap: wrap;
}
.preset-btn {
  min-height: 44px; border-radius: 8px;
  border: 2px solid #446; background: #2a2a3a;
  color: #aac; font-size: 14px; cursor: pointer;
  padding: 8px 20px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.preset-btn:active { background: #3a3a5a; }
</style>
</head>
<body>

<div class="header">
  <h1>VirtualOrgan</h1>
  <div style="display:flex; gap:20px; align-items:center;">
    <div class="gain-control">
      <label>Release</label>
      <input type="range" id="release-slider" min="10" max="1000"
        step="10" value="150" oninput="setReleaseFade(this.value)">
      <span class="gain-value" id="release-value">150ms</span>
    </div>
    <div class="gain-control">
      <label>Volume</label>
      <input type="range" id="gain-slider" min="0" max="200"
        step="1" value="50" oninput="setGain(this.value)">
      <span class="gain-value" id="gain-value">0.50</span>
    </div>
  </div>
</div>

<div id="all-divisions"></div>

<div id="couplers-section" style="display:none">
  <div class="section-label">Couplers</div>
  <div class="coupler-row" id="coupler-row"></div>
</div>

<div class="expression-section">
  <div class="section-label">Division Volume</div>
  <div id="expression-sliders"></div>
</div>

<div class="section-label">Presets</div>
<div class="preset-row">
  <button class="preset-btn" onclick="preset('full')">Full Organ</button>
  <button class="preset-btn" onclick="preset('quiet')">Quiet</button>
  <button class="preset-btn" onclick="preset('off')">All Off</button>
</div>

<script>
let state = null;
let ws = null;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onmessage = (e) => {
    state = JSON.parse(e.data);
    render();
  };
  ws.onclose = () => {
    setTimeout(connectWS, 1000);
  };
  ws.onerror = () => ws.close();
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify(msg));
}

function toggleStop(div, stop) {
  send({action: 'toggle_stop', division: div, stop: stop});
}

function toggleCoupler(idx) {
  send({action: 'toggle_coupler', coupler: idx});
}

function setGain(val) {
  const g = val / 100.0;
  document.getElementById('gain-value').textContent = g.toFixed(2);
  send({action: 'set_gain', value: g});
}

function setReleaseFade(val) {
  document.getElementById('release-value').textContent = val + 'ms';
  send({action: 'set_release_fade', value: parseInt(val)});
}

function setExpression(divIdx, val) {
  const g = val / 100.0;
  const el = document.getElementById('expr-value-' + divIdx);
  if (el) el.textContent = Math.round(g * 100) + '%';
  send({action: 'set_expression', division: divIdx, value: g});
}

function preset(name) {
  if (!state) return;
  state.divisions.forEach((div, d) => {
    send({action: 'preset_' + name, division: d});
  });
}

function render() {
  if (!state) return;

  // Gain slider
  const slider = document.getElementById('gain-slider');
  const gv = document.getElementById('gain-value');
  const g = Math.round(state.gain * 100);
  if (document.activeElement !== slider) {
    slider.value = g;
    gv.textContent = state.gain.toFixed(2);
  }

  // Release fade slider
  const rSlider = document.getElementById('release-slider');
  const rVal = document.getElementById('release-value');
  if (document.activeElement !== rSlider) {
    rSlider.value = state.release_fade_ms;
    rVal.textContent = state.release_fade_ms + 'ms';
  }

  // All divisions with stops — update in-place
  const allDiv = document.getElementById('all-divisions');
  state.divisions.forEach((div, d) => {
    let section = document.getElementById('div-section-' + d);
    if (!section) {
      // First render — create the section
      section = document.createElement('div');
      section.className = 'division-section';
      section.id = 'div-section-' + d;

      const label = document.createElement('div');
      label.className = 'division-label';
      label.textContent = div.name;
      section.appendChild(label);

      const grid = document.createElement('div');
      grid.className = 'stops-grid';
      grid.id = 'stops-grid-' + d;
      div.stops.forEach((stop, s) => {
        const btn = document.createElement('button');
        btn.className = 'stop-btn';
        btn.id = 'stop-' + d + '-' + s;
        btn.textContent = stop.name;
        btn.onclick = () => toggleStop(d, s);
        grid.appendChild(btn);
      });
      section.appendChild(grid);

      allDiv.appendChild(section);
    }
    // Update stop engaged states
    div.stops.forEach((stop, s) => {
      const btn = document.getElementById('stop-' + d + '-' + s);
      if (btn) {
        btn.className = 'stop-btn' + (stop.engaged ? ' engaged' : '');
      }
    });
  });

  // Expression sliders — update in-place to preserve drag state
  const exprDiv = document.getElementById('expression-sliders');
  state.divisions.forEach((div, d) => {
    let slider = document.getElementById('expr-slider-' + d);
    if (!slider) {
      // First render — create the row
      const row = document.createElement('div');
      row.className = 'expression-row';
      row.id = 'expr-row-' + d;

      const label = document.createElement('label');
      label.textContent = div.name;
      row.appendChild(label);

      slider = document.createElement('input');
      slider.type = 'range';
      slider.min = '0';
      slider.max = '100';
      slider.step = '1';
      slider.id = 'expr-slider-' + d;
      slider.oninput = function() { setExpression(d, this.value); };
      row.appendChild(slider);

      const val = document.createElement('span');
      val.className = 'expression-value';
      val.id = 'expr-value-' + d;
      row.appendChild(val);

      exprDiv.appendChild(row);
    }
    // Update value only if not being dragged
    if (document.activeElement !== slider) {
      slider.value = Math.round(div.expression * 100);
      document.getElementById('expr-value-' + d).textContent =
        Math.round(div.expression * 100) + '%';
    }
  });

  // Couplers
  const csec = document.getElementById('couplers-section');
  const crow = document.getElementById('coupler-row');
  if (state.couplers && state.couplers.length > 0) {
    csec.style.display = 'block';
    crow.innerHTML = '';
    state.couplers.forEach((coup, i) => {
      const btn = document.createElement('button');
      btn.className = 'coupler-btn' + (coup.engaged ? ' engaged' : '');
      btn.textContent = coup.name;
      btn.onclick = () => toggleCoupler(i);
      crow.appendChild(btn);
    });
  } else {
    csec.style.display = 'none';
  }

  // Presets — apply to all divisions
}

connectWS();
</script>
</body>
</html>
