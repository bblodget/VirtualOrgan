<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1,
  maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>VirtualOrgan</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a1a1a; color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 12px; user-select: none;
  -webkit-text-size-adjust: 100%;
}
.header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 8px 0 12px;
}
.header h1 { font-size: 20px; font-weight: 600; }
.gain-control {
  display: flex; align-items: center; gap: 8px;
}
.gain-control label { font-size: 14px; color: #999; }
.gain-control input[type=range] {
  width: 150px; height: 8px;
  -webkit-appearance: none; appearance: none;
  background: #444; border-radius: 4px; outline: none;
}
.gain-control input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 24px; height: 24px; border-radius: 50%;
  background: #6a6aff; cursor: pointer;
}
.gain-value { font-size: 14px; color: #aaa; width: 40px; }
.div-tabs {
  display: flex; gap: 6px; padding: 0 0 12px;
  overflow-x: auto;
}
.div-tab {
  padding: 10px 16px; border-radius: 6px;
  border: 2px solid #444; background: #2a2a2a;
  color: #ccc; font-size: 15px; cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.div-tab.active {
  background: #2a2a4a; border-color: #6a6aff;
  color: #fff;
}
.stops-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px; padding: 8px 0 16px;
}
.stop-btn {
  min-height: 56px; border-radius: 8px;
  border: 2px solid #444; background: #2a2a2a;
  color: #ccc; font-size: 15px; cursor: pointer;
  display: flex; align-items: center;
  justify-content: center; text-align: center;
  padding: 8px; line-height: 1.2;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.15s, border-color 0.15s;
}
.stop-btn.engaged {
  background: #1a3a1a; border-color: #3a8a3a;
  color: #6f6; box-shadow: 0 0 10px rgba(0,200,0,0.15);
}
.section-label {
  font-size: 13px; color: #777;
  padding: 4px 0; text-transform: uppercase;
  letter-spacing: 1px;
}
.coupler-row {
  display: flex; gap: 10px; padding: 4px 0 12px;
  flex-wrap: wrap;
}
.coupler-btn {
  min-height: 48px; min-width: 120px;
  border-radius: 8px; border: 2px solid #554;
  background: #2a2a2a; color: #ccc;
  font-size: 14px; cursor: pointer;
  padding: 8px 16px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.15s, border-color 0.15s;
}
.coupler-btn.engaged {
  background: #3a2a1a; border-color: #8a6a3a;
  color: #fb3; box-shadow: 0 0 8px rgba(200,150,0,0.15);
}
.preset-row {
  display: flex; gap: 10px; padding: 4px 0;
  flex-wrap: wrap;
}
.preset-btn {
  min-height: 48px; border-radius: 8px;
  border: 2px solid #446; background: #2a2a3a;
  color: #aac; font-size: 14px; cursor: pointer;
  padding: 8px 20px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.preset-btn:active { background: #3a3a5a; }
</style>
</head>
<body>

<div class="header">
  <h1>VirtualOrgan</h1>
  <div class="gain-control">
    <label>Volume</label>
    <input type="range" id="gain-slider" min="0" max="200"
      step="1" value="50" oninput="setGain(this.value)">
    <span class="gain-value" id="gain-value">0.50</span>
  </div>
</div>

<div class="div-tabs" id="div-tabs"></div>

<div class="stops-grid" id="stops-grid"></div>

<div id="couplers-section" style="display:none">
  <div class="section-label">Couplers</div>
  <div class="coupler-row" id="coupler-row"></div>
</div>

<div class="section-label">Presets</div>
<div class="preset-row">
  <button class="preset-btn" onclick="preset('full')">Full Organ</button>
  <button class="preset-btn" onclick="preset('quiet')">Quiet</button>
  <button class="preset-btn" onclick="preset('off')">All Off</button>
</div>

<script>
let state = null;
let activeDiv = 0;

async function fetchState() {
  try {
    const r = await fetch('/api/state');
    state = await r.json();
    render();
  } catch(e) {}
}

async function toggleStop(div, stop) {
  // Optimistic update — flip locally and re-render immediately
  if (state && state.divisions[div] && state.divisions[div].stops[stop]) {
    state.divisions[div].stops[stop].engaged =
      !state.divisions[div].stops[stop].engaged;
    render();
  }
  await fetch('/api/stop/toggle', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({division: div, stop: stop})
  });
}

async function toggleCoupler(idx) {
  if (state && state.couplers[idx]) {
    state.couplers[idx].engaged = !state.couplers[idx].engaged;
    render();
  }
  await fetch('/api/coupler/toggle', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({coupler: idx})
  });
}

function setGain(val) {
  const g = val / 100.0;
  document.getElementById('gain-value').textContent = g.toFixed(2);
  fetch('/api/gain', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({value: g})
  });
}

async function preset(name) {
  await fetch('/api/preset/' + name, {method: 'POST'});
  setTimeout(fetchState, 100);
}

function render() {
  if (!state) return;

  // Gain slider
  const slider = document.getElementById('gain-slider');
  const gv = document.getElementById('gain-value');
  const g = Math.round(state.gain * 100);
  if (document.activeElement !== slider) {
    slider.value = g;
    gv.textContent = state.gain.toFixed(2);
  }

  // Division tabs
  const tabs = document.getElementById('div-tabs');
  tabs.innerHTML = '';
  state.divisions.forEach((div, i) => {
    const btn = document.createElement('button');
    btn.className = 'div-tab' + (i === activeDiv ? ' active' : '');
    btn.textContent = div.name;
    btn.onclick = () => { activeDiv = i; render(); };
    tabs.appendChild(btn);
  });

  // Stops grid
  const grid = document.getElementById('stops-grid');
  grid.innerHTML = '';
  if (state.divisions[activeDiv]) {
    state.divisions[activeDiv].stops.forEach((stop, s) => {
      const btn = document.createElement('button');
      btn.className = 'stop-btn' + (stop.engaged ? ' engaged' : '');
      btn.textContent = stop.name;
      btn.onclick = () => toggleStop(activeDiv, s);
      grid.appendChild(btn);
    });
  }

  // Couplers
  const csec = document.getElementById('couplers-section');
  const crow = document.getElementById('coupler-row');
  if (state.couplers && state.couplers.length > 0) {
    csec.style.display = 'block';
    crow.innerHTML = '';
    state.couplers.forEach((coup, i) => {
      const btn = document.createElement('button');
      btn.className = 'coupler-btn' + (coup.engaged ? ' engaged' : '');
      btn.textContent = coup.name;
      btn.onclick = () => toggleCoupler(i);
      crow.appendChild(btn);
    });
  } else {
    csec.style.display = 'none';
  }
}

// Poll every 500ms
setInterval(fetchState, 500);
fetchState();
</script>
</body>
</html>
